name: Release

# Push a version tag to build and publish a downloadable macOS app:
#   git tag v0.1.0 && git push origin v0.1.0
# An Apple Silicon (arm64) .dmg is attached to a GitHub Release. This targets
# Apple Silicon only — every Mac sold since ~2020 — because GitHub is retiring
# the Intel macOS runners a universal build would need. You can also run this
# manually (workflow_dispatch) as a dry run that uploads the .dmg as an artifact
# without publishing a Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Cache the compiled engines so only the first release pays the build
      # cost; later releases restore them in seconds. Bump the -vN suffix to
      # force a rebuild (e.g. to pick up a newer llama.cpp/whisper.cpp).
      - name: Cache sidecars
        id: sidecars
        uses: actions/cache@v4
        with:
          path: src-tauri/binaries
          key: sidecars-aarch64-apple-darwin-${{ hashFiles('scripts/fetch-sidecars.sh') }}-v1

      - name: Install CMake
        if: steps.sidecars.outputs.cache-hit != 'true'
        run: brew install cmake

      - name: Build sidecars (llama.cpp + whisper.cpp)
        if: steps.sidecars.outputs.cache-hit != 'true'
        env:
          SIDECAR_TRIPLES: aarch64-apple-darwin
        run: bash scripts/fetch-sidecars.sh

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npx vite build

      - name: Build macOS app (Apple Silicon)
        env:
          # Minisign key for the auto-updater (required — createUpdaterArtifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization (optional — Tauri skips
          # these steps when the secrets are absent, producing an unsigned app).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build

      - name: Assemble release files + update manifest
        id: pkg
        run: |
          set -euo pipefail
          OUT=dist-release
          mkdir -p "$OUT"
          DMG="$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -1)"
          TARGZ="$(ls src-tauri/target/release/bundle/macos/*.app.tar.gz | head -1)"
          cp "$DMG" "$OUT/"
          cp "$TARGZ" "$OUT/Halo.app.tar.gz"
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          SIG="$(cat "${TARGZ}.sig")"
          cat > "$OUT/latest.json" <<JSON
          {
            "version": "$VER",
            "notes": "Halo $VER",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$SIG",
                "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/Halo.app.tar.gz"
              }
            }
          }
          JSON
          ls -la "$OUT"

      - name: Upload artifacts (manual dry run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Halo-macos-arm64
          path: dist-release/*
          if-no-files-found: error

      - name: Publish GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/*.dmg
            dist-release/Halo.app.tar.gz
            dist-release/latest.json
          draft: false
          generate_release_notes: true
          body: |
            Halo — local-first AI notetaking app.

            **macOS (Apple Silicon / M-series):** download the `.dmg` below, open it and drag Halo to Applications.

            This build is unsigned, so on first launch macOS Gatekeeper will block it. Right-click the app → **Open** once (or run `xattr -dr com.apple.quarantine /Applications/Halo.app`), then it opens normally.

            On first run Halo downloads its AI models (one-time). After that, transcription and note-writing work fully offline.

name: Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libasound2-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Frontend tests + coverage
        run: npm run coverage

      - name: Build frontend
        run: npx vite build

      - name: Create placeholder sidecars
        shell: bash
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          EXT=""; [[ "$TRIPLE" == *windows* ]] && EXT=".exe"
          mkdir -p src-tauri/binaries
          printf '' > "src-tauri/binaries/llama-server-$TRIPLE$EXT"
          printf '' > "src-tauri/binaries/whisper-cli-$TRIPLE$EXT"

      - name: Backend tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev libasound2-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Full coverage (frontend + backend, 100% enforced)
        run: bash scripts/coverage.sh
